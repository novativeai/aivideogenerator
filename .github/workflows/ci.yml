name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Backend Tests
  # NOTE: this repo IS the backend — main.py / requirements.txt live at the
  # repo root (not under ./video-generator-backend). Paths are root-relative.
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest --cov=. --cov-report=xml --cov-report=term-missing
        env:
          ENV: test
          FIREBASE_SERVICE_ACCOUNT_BASE64: ''
          PAYTRUST_API_KEY: test_key
          PAYTRUST_PROJECT_ID: test_project
          PAYTRUST_SIGNING_KEY: test_signing_key
          REPLICATE_API_TOKEN: test_token

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          flags: backend
        continue-on-error: true

  # Security Scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
        continue-on-error: true

  # Dependency Audit
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Backend dependency check
        run: |
          pip install safety
          safety check -r requirements.txt
        continue-on-error: true

  # All checks passed
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [test-backend]
    steps:
      - name: All checks passed
        run: echo "All CI checks passed successfully!"
